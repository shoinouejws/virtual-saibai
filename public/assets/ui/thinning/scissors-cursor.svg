<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" aria-hidden="true">
  <title>Pruning shears cursor</title>
  <defs>
    <linearGradient id="sc-blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="55%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="sc-grip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Open toward upper-left (bisector ~ NW / 45deg from horizontal toward top-left); hotspot stays (16,16) -->
  <g transform="rotate(-135 16 16)">
  <!-- upper blade -->
  <path
    fill="url(#sc-blade)"
    stroke="#334155"
    stroke-width="0.6"
    stroke-linejoin="round"
    d="M16.2 16.2 L27.2 5.5 L29 7.3 L22.5 15.8 L18.5 17.8 Z"
  />
  <!-- lower blade -->
  <path
    fill="url(#sc-blade)"
    stroke="#334155"
    stroke-width="0.6"
    stroke-linejoin="round"
    d="M16.2 16.2 L27.2 27 L29 25.2 L22.5 16.6 L18.5 14.6 Z"
  />
  <!-- grip (upper blade side) -->
  <path
    fill="url(#sc-grip)"
    stroke="#9a3412"
    stroke-width="0.55"
    stroke-linejoin="round"
    d="M14.5 17.8 L9 22 L6.5 27.5 L8.8 29.2 L12 25.5 L15.8 19.2 Z"
  />
  <!-- grip (lower blade side) -->
  <path
    fill="url(#sc-grip)"
    stroke="#9a3412"
    stroke-width="0.55"
    stroke-linejoin="round"
    d="M14.8 14.5 L9 11.5 L6.5 6.2 L8.8 4.5 L12 8.5 L16 14.2 Z"
  />
  <!-- pivot (aligns with cursor hotspot 16,16 in ThinningPrototypePage) -->
  <circle cx="16" cy="16" r="3.2" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <circle cx="16" cy="16" r="1.2" fill="#cbd5e1"/>
  </g>
</svg>
